server:
  port: 8080

spring:
  application:
    name: evalx-backend

  profiles:
    active: postgres

  datasource:
    url: jdbc:h2:mem:evalxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  auth:
    admin-user: admin
    admin-password: admin123
    admin-token: evalx-admin-secret-token-2026
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:8080"

springdoc:
  api-docs:
    path: /api-docs

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false

app:
  cors:
    allowed-origins: "*"