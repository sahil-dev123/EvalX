<!DOCTYPE html>
<html lang="en">
<head>

  <title>EvalX — AI-Ready Exam Analytics Platform</title>
  <meta name="description" content="Upload your response sheet and instantly calculate exam marks, predicted percentile, and estimated rank with EvalX.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
